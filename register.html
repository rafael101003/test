<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar-se</title>
    <link rel="stylesheet" href="register.css">
                     <!--Links de fontes-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Krona+One&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="register.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/efd7919b33.js" crossorigin="anonymous"></script>
</head>
<body>
    <main>
        <h1>sign-in</h1>
        <div>
            <p>Não insira dados reais, página demonstrativa para estudo.</p>
        </div>
    </main>
            <!--botões-->
    <section>
        <div class="input">
            <div class="alignItens">
                <i class="fa-solid fa-bolt fa-2x"></i>
                <p>insira usuario e senha</p>
            </div>
                        <!--botões de login-->
            <input type="text" class="inputNome" id="inserirNome" placeholder="insira seu nome de usuário">
            <input type="password" class="inputSenha" id="inserirSenha" placeholder="Insira sua senha...">
                        <!--botão de login-->
            <div>
                <button onclick="register()">Register</button>                
                <button onclick="voltar()">voltar</button>
            </div> 
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
